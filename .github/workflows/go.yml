name: dmarcgo CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
          verify: true

  stix:
    name: STIX 2.1 interoperability
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      # The 3.3.1 PyPI artifact omits the validator's STIX JSON Schema
      # submodules. Check out the exact release commit recursively so the
      # validator uses the schema revision pinned by that release.
      - name: Check out the OASIS STIX validator
        uses: actions/checkout@v7
        with:
          repository: oasis-open/cti-stix-validator
          ref: d3ef2a5fc0dfdbd12a794ea084b9c48a5e17e3f2
          path: .stix2-validator
          submodules: recursive
          persist-credentials: false

      - name: Install the OASIS STIX validator
        run: python -m pip install ./.stix2-validator

      - name: Validate the interoperability fixture
        run: make stix-validator-check

  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Test
        run: go test -v ./...

      - name: Public helper API tests
        run: go test -run 'TestParse|TestLoadBytes|TestLoadReader|TestLoadReportsFromDir|TestSummary|TestWriteFeaturesJSONL|TestWriteFeaturesCSV|TestValidate|TestMergeSummaries|TestDateRange' ./...

      - name: Output contract tests
        run: make output-contract-check

      - name: Race detector
        run: go test -race ./...

      - name: Fuzz smoke tests
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x'
        run: make fuzz-smoke

      - name: Benchmark smoke tests
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x'
        run: make bench-smoke

      - name: Build
        run: go build -v ./...

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          check-latest: true
          cache: false

      - name: Verify formatting
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt must be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Verify module files are tidy
        run: |
          go mod tidy
          if [ -f go.sum ]; then
            git diff --exit-code go.mod go.sum
          else
            git diff --exit-code go.mod
          fi

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Compile README examples
        run: python3 scripts/check_readme_examples.py

      - name: Validate project wiki source
        run: make wiki-check

      - name: Validate independent analysis workflows
        run: make workflow-check

      - name: Validate security-simulation campaign correlation
        run: make campaign-check

      - name: Validate provider catalog and review dates
        run: make provider-catalog-check

      - name: Coverage
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          python3 scripts/check_coverage.py --profile coverage.out --min 80.0
