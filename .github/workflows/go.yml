name: dmarcgo CI

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (${{ matrix.os }}, Go ${{ matrix.go-version }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ["1.25.x", "1.26.x"]

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: false

      - name: Test
        run: go test -v ./...

      - name: Public helper API tests
        run: go test -run 'TestParse|TestLoadBytes|TestLoadReader|TestLoadReportsFromDir|TestSummary|TestWriteFeaturesJSONL|TestWriteFeaturesCSV|TestValidate|TestMergeSummaries|TestDateRange' ./...

      - name: Race detector
        run: go test -race ./...

      - name: Fuzz smoke tests
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x'
        run: make fuzz-smoke

      - name: Benchmark smoke tests
        if: matrix.os == 'ubuntu-latest' && matrix.go-version == '1.26.x'
        run: make bench-smoke

      - name: Build
        run: go build -v ./...

  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: false

      - name: Verify formatting
        run: |
          fmt_out=$(gofmt -l .)
          if [ -n "$fmt_out" ]; then
            echo "gofmt must be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Verify module files are tidy
        run: |
          go mod tidy
          if [ -f go.sum ]; then
            git diff --exit-code go.mod go.sum
          else
            git diff --exit-code go.mod
          fi

      - name: Vet
        run: go vet ./...

      - name: Staticcheck
        run: |
          go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

      - name: Govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Compile README examples
        run: python3 scripts/check_readme_examples.py

      - name: Coverage
        run: |
          go test -covermode=atomic -coverprofile=coverage.out ./...
          python3 scripts/check_coverage.py --profile coverage.out --min 80.0
