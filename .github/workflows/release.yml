name: dmarcgo Release

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - "v2.*.*"

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Validate release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"

          if [[ ! "${tag}" =~ ^v2\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "release tag must be a semantic v2 version, got ${tag}" >&2
            exit 1
          fi

          grep -Fx 'module github.com/georgestarcher/dmarcgo/v2' go.mod
          grep -Eq "^## \\[${version}\\] - [0-9]{4}-[0-9]{2}-[0-9]{2}$" CHANGELOG.md

          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.sha')"
          tag_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.type')"
          if [[ "${tag_type}" != "tag" ]]; then
            echo "release tag ${tag} must be an annotated tag" >&2
            exit 1
          fi
          if [[ "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')" != "true" ]]; then
            echo "release tag ${tag} must have a GitHub-verified signature" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "release tag ${tag} must point to a commit on main" >&2
            exit 1
          fi

      - name: Verify module
        run: make ci

  release:
    name: Create GitHub release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists"
            exit 0
          fi
          release_args=(
            --verify-tag
            --generate-notes
            --title "dmarcgo ${GITHUB_REF_NAME}"
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" "${release_args[@]}"
