name: dmarcgo Release

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    tags:
      - "v3.*.*"

jobs:
  verify:
    name: Verify release tag
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version: "1.26.x"
          cache: false

      - name: Validate release metadata
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          python3 scripts/validate_release_metadata.py --tag "${tag}"

          tag_sha="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.sha')"
          tag_type="$(gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/${tag}" --jq '.object.type')"
          if [[ "${tag_type}" != "tag" ]]; then
            echo "release tag ${tag} must be an annotated tag" >&2
            exit 1
          fi
          if [[ "$(gh api "repos/${GITHUB_REPOSITORY}/git/tags/${tag_sha}" --jq '.verification.verified')" != "true" ]]; then
            echo "release tag ${tag} must have a GitHub-verified signature" >&2
            exit 1
          fi
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "release tag ${tag} must point to a commit on main" >&2
            exit 1
          fi

      - name: Verify module
        run: make ci

  release:
    name: Create GitHub release
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Build release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          python3 scripts/extract_changelog.py "${version}" > release-notes.md
          test -s release-notes.md

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            echo "GitHub release ${GITHUB_REF_NAME} already exists"
            exit 0
          fi
          release_args=(
            --verify-tag
            --notes-file release-notes.md
            --title "dmarcgo ${GITHUB_REF_NAME}"
          )
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            release_args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" "${release_args[@]}"
