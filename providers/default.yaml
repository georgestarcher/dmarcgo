  - id: amazon-ses
    name: Amazon Simple Email Service
    aliases: [ses, aws-ses]
    status: active
    official_domains: [amazon.com, aws.amazon.com]
    spf:
      includes:
        - name: amazonses.com
          status: active
          match: exact
          evidence_confidence: high
          expected_terminal_behavior: softfail
      live_expansion_required: true
    dkim:
      setup_model: Easy DKIM or caller-managed BYODKIM
      custom_domain_signing_expected: true
      preferred_rsa_bits: 2048
      tenant_specific: true
      provider_managed_rotation: true
      note: Easy DKIM uses tenant-specific DNS records; exact names and values come from SES.
    alignment:
      custom_mail_from: supported
      custom_mail_from_required_for_spf_dmarc_alignment: true
      note: A custom MAIL FROM domain is required when DMARC must align through SPF rather than DKIM.
    infrastructure:
      shared: true
    companion_records:
      - id: custom-mail-from-mx
        type: MX
        condition: A custom MAIL FROM domain is configured.
        purpose: Route bounces to the regional SES feedback endpoint supplied by AWS.
      - id: custom-mail-from-spf
        type: TXT
        condition: A custom MAIL FROM domain is configured.
        purpose: Publish the SES SPF authorization supplied by AWS.
    documentation:
      - url: https://docs.aws.amazon.com/ses/latest/dg/mail-from.html
        title: Amazon SES custom MAIL FROM
      - url: https://docs.aws.amazon.com/ses/latest/dg/send-email-authentication-dkim.html
        title: Amazon SES DKIM authentication
      - url: https://docs.aws.amazon.com/ses/latest/dg/send-email-authentication-dmarc.html
